<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | GAD Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Tailwind (precompiled) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <style>
        body {
            background: #f8fafc;
        }

        .card-glow {
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .input-field {
            border: 1.5px solid #e5e7eb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #006837;
            box-shadow: 0 0 0 3px rgba(0, 104, 55, 0.15);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.45s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans px-4">

    <!-- Subtle decorative pattern -->
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 30px 30px;">
    </div>

    <div class="relative z-10 w-full max-w-sm fade-up">
        <!-- Card -->
        <div class="bg-white rounded-3xl card-glow p-8 md:p-10">

            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="w-14 h-14 bg-primary-green rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-shield-alt text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-900">Admin Access</h1>
                <p class="text-gray-400 text-sm mt-1">GAD Corner · Rodriguez, Rizal</p>
            </div>

            <!-- Error Banner -->
            {% if error %}
            <div
                class="bg-red-50 border border-red-100 text-red-700 text-sm px-4 py-3 rounded-xl flex items-center gap-2 mb-5">
                <i class="fas fa-exclamation-circle text-red-400"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" action="{{ url_for('admin.login') }}" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1.5"
                        for="username">
                        Username
                    </label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
                            <i class="fas fa-user"></i>
                        </span>
                        <input id="username" name="username" type="text" required autocomplete="username"
                            placeholder="admin"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm bg-gray-50 text-gray-800">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1.5"
                        for="password">
                        Password
                    </label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input id="password" name="password" type="password" required autocomplete="current-password"
                            placeholder="••••••••"
                            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm bg-gray-50 text-gray-800">
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-primary-green hover:bg-primary-hover text-white font-bold py-3 rounded-xl text-sm transition-colors duration-200 shadow-md mt-2 flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Back link -->
            <p class="text-center text-xs text-gray-400 mt-6">
                <a href="{{ url_for('main.index') }}" class="hover:text-primary-green transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Back to public site
                </a>
            </p>
        </div>

        <p class="text-center text-[10px] text-gray-400 mt-6">Restricted access · Authorized personnel only</p>
    </div>
</body>

</html>
