services:
  - type: web
    name: gad-corner
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEBUG
        value: "False"
